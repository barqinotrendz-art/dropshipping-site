<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/src/assets/logocircle.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- SEO Meta -->
    <title>Easy Buy — Online Store for Electronics, Fashion & More</title>
    <meta
      name="description"
      content="Shop a wide range of products from electronics, fashion, watches, home essentials, and more. Easy Buy delivers quality products fast anywhere in the region with reliable service."
    />
    <meta
      name="keywords"
      content="easy buy, online store, electronics, fashion, watches, home essentials, shopping online, dropshipping store"
    />
    <meta name="author" content="Easy Buy" />
    <link rel="canonical" href="https://dropshipping-site-xi.vercel.app/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Easy Buy — Online Store for Electronics, Fashion & More" />
    <meta
      property="og:description"
      content="Discover a wide variety of products including electronics, fashion, watches, home essentials, and more at Easy Buy. Fast delivery and reliable service."
    />
    <meta property="og:image" content="https://dropshipping-site-xi.vercel.app/logo.png" />
    <meta property="og:url" content="https://dropshipping-site-xi.vercel.app/" />
    <meta property="og:site_name" content="Easy Buy" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Easy Buy — Online Store for Electronics, Fashion & More" />
    <meta
      name="twitter:description"
      content="Shop electronics, fashion, watches, and home essentials from Easy Buy. Quality products, fast delivery, anywhere in the region."
    />
    <meta name="twitter:image" content="https://dropshipping-site-xi.vercel.app/logo.png" />

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Easy Buy",
        "url": "https://dropshipping-site-xi.vercel.app/",
        "logo": "https://dropshipping-site-xi.vercel.app/android-chrome-512x512.png",
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "email": "support@easybuy.store",
            "contactType": "customer support",
            "areaServed": "Global",
            "availableLanguage": "English"
          }
        ],
        "sameAs": [
          "https://www.instagram.com/easybuy",
          "https://www.facebook.com/easybuy",
          "https://twitter.com/easybuy"
        ]
      }
    </script>

    <!-- WebSite Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Easy Buy",
        "url": "https://dropshipping-site-xi.vercel.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://dropshipping-site-xi.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
